name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: pytest
      
  trigger-jenkins:
    runs-on: self-hosted
    steps: 
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Trigger Jenkins Job
      uses: appleboy/jenkins-action@v1
      with:
        url: "http://172.31.104.244:8080/"
        user: "cloud"
        token: ${{ secrets.JENKINS_TOKEN }}
        job: "ACEest_CI_CD_pipiline"
        wait: true # Optional: Wait for the resul
  