name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: pytest
      
    - name: Trigger Jenkins Job
      uses: appleboy/jenkins-action@v1
      with:
        url: "http://localhost:8080/"
        user: "Abhijat-2024ht66529"
        token: 119a2be34d5c6a6a698e54fb4fe5eee341
        job: "ACEest-CI-pipelines2"
        wait: true # Optional: Wait for the result
  